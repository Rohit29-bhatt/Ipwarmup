<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IP Warmup Tool — Login</title>
<style>
  :root {
    --bg:     #0f1117;
    --bg2:    #161b27;
    --bg3:    #1e2535;
    --border: #2a3347;
    --accent: #4f8ef7;
    --green:  #22c55e;
    --red:    #ef4444;
    --text:   #e2e8f0;
    --muted:  #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  .login-wrap {
    width: 100%; max-width: 400px; padding: 20px;
  }

  .logo {
    text-align: center; margin-bottom: 32px;
  }
  .logo .flame { font-size: 48px; display: block; margin-bottom: 10px; }
  .logo h1 { font-size: 22px; font-weight: 700; }
  .logo p { font-size: 14px; color: var(--muted); margin-top: 4px; }

  .card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 32px;
  }

  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 500;
    color: var(--muted); margin-bottom: 6px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .input-wrap { position: relative; }
  .form-group input {
    width: 100%; padding: 11px 40px 11px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 15px;
    transition: border 0.15s; letter-spacing: 0.05em;
  }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .toggle-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 16px; padding: 0;
  }

  .btn-login {
    width: 100%; padding: 12px; background: var(--accent);
    border: none; border-radius: 8px; color: #fff;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: background 0.15s; margin-top: 4px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-login:hover { background: #3d7ef0; }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    display: none; margin-top: 14px; padding: 10px 14px;
    background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px; color: #f87171; font-size: 13px;
    text-align: center;
  }
  .error-msg.show { display: block; }

  .footer {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: var(--muted);
  }

  /* shake animation on wrong password */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <span class="flame">🔥</span>
    <h1>IP Warmup Tool</h1>
    <p>Email automation & engagement platform</p>
  </div>

  <div class="card">
    <h2>🔒 Enter access password</h2>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="pwd-input" placeholder="Enter password"
               autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
        <button class="toggle-eye" onclick="toggleEye()" type="button" id="eye-btn" title="Show/hide">👁</button>
      </div>
    </div>

    <button class="btn-login" id="login-btn" onclick="doLogin()">
      <span id="btn-text">Unlock Tool</span>
    </button>

    <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
  </div>

  <div class="footer">Access is restricted to authorised team members only.</div>
</div>

<script>
  // Auto-focus
  document.getElementById('pwd-input').focus();

  function toggleEye() {
    const inp = document.getElementById('pwd-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  async function doLogin() {
    const btn   = document.getElementById('login-btn');
    const txt   = document.getElementById('btn-text');
    const err   = document.getElementById('error-msg');
    const input = document.getElementById('pwd-input');
    const pwd   = input.value.trim();

    if (!pwd) { input.focus(); return; }

    btn.disabled = true;
    txt.textContent = 'Checking…';
    err.classList.remove('show');

    try {
      const res  = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      });
      const data = await res.json();

      if (data.ok) {
        txt.textContent = '✓ Unlocked! Loading…';
        btn.style.background = '#22c55e';
        setTimeout(() => window.location.href = '/', 400);
      } else {
        err.textContent = data.error || 'Incorrect password.';
        err.classList.add('show');
        document.querySelector('.card').classList.add('shake');
        setTimeout(() => document.querySelector('.card').classList.remove('shake'), 450);
        input.value = '';
        input.focus();
        btn.disabled = false;
        txt.textContent = 'Unlock Tool';
      }
    } catch(e) {
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('show');
      btn.disabled = false;
      txt.textContent = 'Unlock Tool';
    }
  }
</script>
</body>
</html>
